name: Publish Release

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: Version bump to publish
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  publish:
    runs-on: macos-26
    env:
      GH_TOKEN: ${{ github.token }}
      RELEASE_TYPE: ${{ inputs.release_type }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: main

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Select latest Xcode
        run: |
          # List available Xcode versions
          ls -d /Applications/Xcode*.app 2>/dev/null || true
          # Pick the highest-versioned Xcode available
          latest=$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -1)
          if [[ -n "$latest" ]]; then
            echo "Selecting $latest"
            sudo xcode-select -s "$latest/Contents/Developer"
          fi
          echo "Active SDK: $(xcrun --show-sdk-version)"
          echo "Swift: $(swift --version 2>&1 | head -1)"

      - name: Bump version and build release
        run: |
          case "$RELEASE_TYPE" in
            patch) make build ;;
            minor) make release-minor ;;
            major) make release-major ;;
            *)
              echo "Unsupported release type: $RELEASE_TYPE"
              exit 1
              ;;
          esac

      - name: Run unit tests
        run: swift run apfel-tests

      - name: Capture release version
        id: version
        run: echo "value=$(cat .version)" >> "$GITHUB_OUTPUT"

      - name: Commit release files
        run: |
          version="${{ steps.version.outputs.value }}"
          git add .version README.md Sources/BuildInfo.swift
          git commit -m "release v$version"
          git tag -a "v$version" -m "v$version"
          git push origin HEAD:main
          git push origin "v$version"

      - name: Package release artifact
        id: asset
        run: |
          make package-release-asset >/tmp/apfel-release-asset.txt
          echo "name=$(tail -1 /tmp/apfel-release-asset.txt)" >> "$GITHUB_OUTPUT"
          echo "sha256=$(make print-release-sha256)" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub release
        run: |
          version="${{ steps.version.outputs.value }}"
          asset="${{ steps.asset.outputs.name }}"
          if gh release view "v$version" >/dev/null 2>&1; then
            gh release upload "v$version" "$asset" --clobber
          else
            gh release create "v$version" "$asset" --title "v$version" --notes "Automated release for v$version"
          fi
